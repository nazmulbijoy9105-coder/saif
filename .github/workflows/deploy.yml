name: SAIF CI/CD Pipeline
# Creator: Md Nazmul Islam (Bijoy) | NB TECH Bangladesh | ILRMF Engine v1.0

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────
  backend-test:
    name: Backend — Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run SAIF tests
        run: pytest app/tests/ -v --tb=short
        env:
          GEMINI_API_KEY: test_key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test_key
          STRIPE_SECRET_KEY: sk_test_xxx
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_BASIC_PRICE_ID: price_test
          STRIPE_PRO_PRICE_ID: price_test
          STRIPE_ENTERPRISE_PRICE_ID: price_test
          UPSTASH_REDIS_URL: ""
          UPSTASH_REDIS_TOKEN: ""

  # ── Frontend Build ────────────────────────────────────────────
  frontend-build:
    name: Frontend — Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb') }}

      - name: Install dependencies
        run: bun install

      - name: Build Next.js
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: https://saif-backend.onrender.com
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_xxx

  # ── Deploy Backend to Render ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"serviceId": "${{ secrets.RENDER_SERVICE_ID }}"}' \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

  # ── Deploy Frontend to Vercel ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Vercel CLI
        run: bun install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
